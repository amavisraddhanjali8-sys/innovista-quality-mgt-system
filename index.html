
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovista Metal Fabriconix QMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Dark Mode Global Overrides */
        html.dark body {
            background-color: #020617; /* slate-950 */
            color: #f8fafc;
        }

        /* Target common Tailwind classes for "all-corners" coverage in Dark Mode */
        html.dark .bg-white {
            background-color: #0f172a !important; /* slate-900 */
            color: #f8fafc !important;
        }

        html.dark .bg-slate-50 {
            background-color: #1e293b !important; /* slate-800 */
        }

        html.dark .bg-slate-100 {
            background-color: #1e293b !important;
        }

        html.dark .bg-slate-50\/50 {
            background-color: rgba(30, 41, 59, 0.5) !important;
        }

        html.dark .text-slate-900 {
            color: #f8fafc !important;
        }

        html.dark .text-slate-800 {
            color: #f1f5f9 !important;
        }

        html.dark .text-slate-700 {
            color: #e2e8f0 !important;
        }

        html.dark .text-slate-600 {
            color: #94a3b8 !important;
        }

        html.dark .border-slate-200, 
        html.dark .border-slate-100 {
            border-color: #334155 !important; /* slate-700 */
        }

        html.dark .shadow-sm,
        html.dark .shadow-xl {
            shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        /* Fix for charts in dark mode */
        html.dark .recharts-cartesian-grid-horizontal line,
        html.dark .recharts-cartesian-grid-vertical line {
            stroke: #334155;
        }

        /* Fix for inputs in dark mode */
        html.dark input, 
        html.dark select, 
        html.dark textarea {
            background-color: #1e293b !important;
            color: #f8fafc !important;
            border-color: #334155 !important;
        }

        html.dark input::placeholder {
            color: #475569 !important;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",

    "recharts": "https://esm.sh/recharts@^3.7.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.564.0"
  }
}
</script>
</head>

    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
